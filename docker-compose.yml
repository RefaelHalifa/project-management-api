services:

  # ─── PostgreSQL Database ───────────────────────────────────────────
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Notifications Microservice ────────────────────────────────────
  notifications:
    build:
      context: ./notifications_service   # build from this folder
      dockerfile: Dockerfile             # using its own Dockerfile
    restart: always
    ports:
      - "8001:8001"                      # runs on port 8001
    # No database needed — this service is stateless

  # ─── FastAPI Main Application ──────────────────────────────────────
  app:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/project_management
      SECRET_KEY: supersecretkey2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy       # wait for postgres to be ready
      notifications:
        condition: service_started       # wait for notifications to start
    volumes:
      - ./uploads:/app/uploads

# ─── Named Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data: